model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
personality = "pragmatic"
model_verbosity = "low"
model_reasoning_summary = "concise"
web_search = "live"
suppress_unstable_features_warning = true
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "danger-full-access"
full_cdp_access_enabled = true

[desktop]
followUpQueueMode = "queue"
composerEnterBehavior = "enter"
dock-icon-preference = "codex-dark"
git-branch-prefix = ""
git-pull-request-merge-method = "squash"
localeOverride = "zh-TW"
mac-menu-bar-enabled = true
preventSleepWhileRunning = true
reviewDelivery = "inline"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true
notifications-turn-mode = "off"
hotkey-window-projectless-default-enabled = true
enabled-reasoning-efforts = ["medium", "xhigh", "ultra"]
show-ultra-in-model-picker-slider = true
appearanceDarkCodeThemeId = "codex"
appshotDestination = "last-chat"

[desktop.appearanceDarkChromeTheme]
accent = "#0169cc"
contrast = 50
ink = "#fcfcfc"
opaqueWindows = false
surface = "#111111"

[desktop.appearanceDarkChromeTheme.fonts]
code = "Berkeley Mono"
ui = "SF Pro"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#e02e2a"
skill = "#b06dff"

[desktop.appearanceLightChromeTheme]
accent = "#339cff"
contrast = 45
ink = "#1a1c1f"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]
code = "Berkeley Mono"
ui = "SF Pro"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#ba2623"
skill = "#924ff7"

[features]
fast_mode = false
default_mode_request_user_input = true
memories = true
prevent_idle_sleep = true
chronicle = true

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 11

[tui]
terminal_title = []

status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-used", "five-hour-limit", "weekly-limit"]
