model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
personality = "pragmatic"
model_verbosity = "low"
model_reasoning_summary = "concise"
web_search = "live"
suppress_unstable_features_warning = true
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "danger-full-access"
full_cdp_access_enabled = true

service_tier = "default"

[desktop]
followUpQueueMode = "queue"
composerEnterBehavior = "enter"
dock-icon-preference = "codex-dark"
git-branch-prefix = ""
git-pull-request-merge-method = "squash"
localeOverride = "zh-TW"
mac-menu-bar-enabled = true
preventSleepWhileRunning = true
reviewDelivery = "inline"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true
hotkey-window-projectless-default-enabled = true
enabled-reasoning-efforts = ["low", "medium", "high", "xhigh", "ultra"]
show-ultra-in-model-picker-slider = true

[features]
fast_mode = false
default_mode_request_user_input = true
memories = true
prevent_idle_sleep = true
chronicle = true
js_repl = false

[tui]
terminal_title = []

status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-used", "five-hour-limit", "weekly-limit"]
