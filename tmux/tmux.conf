unbind C-b
set -g prefix C-t
bind C-t send-prefix

set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features ",xterm-ghostty:RGB,clipboard,extkeys"
set -as terminal-features ",xterm*:RGB,clipboard,extkeys"
set -g focus-events on
set -sg escape-time 10
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -s set-clipboard external

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
unbind %
unbind '"'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -gF @catppuccin_application_text ' #{?#{m/*unknown*,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'

set -g @prefix_highlight_fg '#11111b'
set -g @prefix_highlight_bg '#cba6f7'
set -g @prefix_highlight_prefix '  '

run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-left-length 120
set -g status-left '#{prefix_highlight}#{E:@catppuccin_status_session}'
set -g status-right ''

run '~/.tmux/plugins/tpm/tpm'
